---
configuration:
  import_mode:
    name: Import-Modus
    description: >-
      Legt fest, wie Aktivitäten importiert werden: `stravaApi` (über die Strava-API, benötigt die Strava-Zugangsdaten unten) oder `files` (Import von `.fit`-/`.tcx`-/`.gpx`-Dateien, die du bereitstellst).
  strava_client_id:
    name: Strava-Client-ID
    description: >-
      OAuth-Client-ID deiner Strava-API-Anwendung. Nur erforderlich, wenn der Import-Modus `stravaApi` ist.
  strava_client_secret:
    name: Strava-Client-Secret
    description: >-
      OAuth-Client-Secret deiner Strava-API-Anwendung. Nur erforderlich, wenn der Import-Modus `stravaApi` ist.
  strava_refresh_token:
    name: Strava-Refresh-Token
    description: >-
      Refresh-Token, um Zugriffstoken für Strava-API-Anfragen zu erhalten. Nur erforderlich, wenn der Import-Modus `stravaApi` ist.
  tz:
    name: Zeitzone
    description: >-
      Zeitzone des Containers (z. B. `Etc/GMT` oder `Europe/Berlin`).
  app_url:
    name: App-URL
    description: >-
      Die URL, unter der du die App erreichst, inklusive Port, falls verwendet. Erforderlich; die App startet ohne diese Angabe nicht. Für Home-Assistant-Ingress genügt ein Wert wie `http://localhost:8080`; für Direktzugriff und Webhooks eine echte URL angeben.
  admin_username:
    name: Admin-Benutzername
    description: >-
      Benutzername für den Login des integrierten Admin-Panels.
  admin_password:
    name: Admin-Passwort
    description: >-
      Passwort für den Login des integrierten Admin-Panels. Erforderlich; das Admin-Panel benötigt einen Login. Das Add-on hasht es, bevor es an die App übergeben wird.
  expose_share:
    name: Datei-Import-Verzeichnis freigeben
    description: >-
      Gibt das Überwachungsverzeichnis für den Datei-Import über das gemappte Config-Verzeichnis des Add-ons frei (SMB/CIFS), sodass du `.fit`-/`.tcx`-/`.gpx`-Dateien dort ablegen kannst. Wird mit Import-Modus `files` verwendet.
  caddy_log_level:
    name: Caddy-Loglevel
    description: >-
      Log-Level des integrierten Webservers (`DEBUG`, `INFO`, `WARN` oder `ERROR`).
network:
  8080/tcp: Dreeve Web-UI
