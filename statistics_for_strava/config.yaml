name: "Dreeve"
version: "0.5.1"
slug: "statistics_for_strava"
description: "Dashboard for your sports & fitness data"
url: "https://github.com/dreeveapp/dreeve"
arch:
  - amd64
  - aarch64
startup: services
boot: auto
init: false
ingress: true
ingress_port: 8080
ingress_stream: true
panel_icon: "mdi:chart-line"
panel_title: "Dreeve"
homeassistant: "2025.1.0"
changelog: true

ports:
  8080/tcp: null
ports_description:
  8080/tcp: "Dreeve Web UI"
webui: "http://[HOST]:[PORT:8080]"
watchdog: "http://[HOST]:[PORT:8080]/healthz"

# Map the add-on's own config dir (mounted at /config inside the container, and
# exposed on the host as /addon_configs/local_statistics_for_strava). Backs the
# file-import watch directory (expose_share). Scoped to this add-on's dir
# only (not all of /share).
map:
  - addon_config:rw

# In v5, the app's configuration lives in its database and is edited via the
# built-in admin panel, not via add-on options. These options are just the
# env-shaped keys the app needs at boot.
options:
  import_mode: "stravaApi"
  strava_client_id: ""
  strava_client_secret: ""
  strava_refresh_token: ""
  tz: "Etc/GMT"
  app_url: ""
  admin_username: "admin"
  admin_password: ""
  expose_share: false
  caddy_log_level: "ERROR"

schema:
  import_mode: "list(stravaApi|files)"
  strava_client_id: str?
  strava_client_secret: password?
  strava_refresh_token: password?
  tz: str
  app_url: str?
  admin_username: str
  admin_password: password?
  expose_share: bool
  caddy_log_level: "list(DEBUG|INFO|WARN|ERROR)"
