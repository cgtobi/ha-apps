---
configuration:
  import_mode:
    name: Import mode
    description: >-
      How activities are imported: `stravaApi` (from the Strava API, requires the Strava credentials below) or `files` (import `.fit`/`.tcx`/`.gpx` files you provide).
  strava_client_id:
    name: Strava client ID
    description: >-
      OAuth client ID from your Strava API application. Required only when import mode is `stravaApi`.
  strava_client_secret:
    name: Strava client secret
    description: >-
      OAuth client secret from your Strava API application. Required only when import mode is `stravaApi`.
  strava_refresh_token:
    name: Strava refresh token
    description: >-
      Refresh token used to obtain access tokens for Strava API requests. Required only when import mode is `stravaApi`.
  tz:
    name: Time zone
    description: >-
      Container time zone (for example `Etc/GMT` or `Europe/Berlin`).
  app_url:
    name: App URL
    description: >-
      The URL you reach the app on, including the port if used. Required; the app will not start without it. For Home Assistant ingress a value like `http://localhost:8080` is fine; set a real URL for direct access and webhooks.
  admin_username:
    name: Admin username
    description: >-
      Username for the built-in admin panel login.
  admin_password:
    name: Admin password
    description: >-
      Password for the built-in admin panel login. Required; the admin panel needs a login. The add-on hashes it before passing it to the app.
  expose_share:
    name: Expose file-import watch directory
    description: >-
      Expose the file-import watch directory over the add-on's mapped config directory (SMB/CIFS) so you can drop `.fit`/`.tcx`/`.gpx` files into it. Used with import mode `files`.
  caddy_log_level:
    name: Caddy log level
    description: >-
      Log verbosity for the embedded web server (`DEBUG`, `INFO`, `WARN`, or `ERROR`).
network:
  8080/tcp: Dreeve web UI
